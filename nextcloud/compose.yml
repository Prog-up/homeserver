name: nextcloud

services:
  nextcloud-db:
    image: docker.io/postgres:16-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    volumes:
      - ${DATA_PATH}/nextcloud/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - proxy

  nextcloud:
    image: docker.io/nextcloud:production
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      - nextcloud-db
    volumes:
      - ${DATA_PATH}/nextcloud/data:/var/www/html
    environment:
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - NEXTCLOUD_TRUSTED_PROXIES=${LOCAL_IP} traefik
      - OVERWRITEPROTOCOL=https
      - OVERWRITEWEBROOT=/nextcloud
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`${LOCAL_IP}`) && PathPrefix(`/nextcloud`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.tls=true"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
      - "traefik.http.routers.nextcloud-ts.rule=Host(`${TAILSCALE_HOST}`) && PathPrefix(`/nextcloud`)"
      - "traefik.http.routers.nextcloud-ts.entrypoints=websecure"
      - "traefik.http.routers.nextcloud-ts.tls=true"
      - "traefik.http.routers.nextcloud-ts.service=nextcloud"

networks:
  proxy:
    external: true
    name: homeserver_proxy
