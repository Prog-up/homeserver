name: matrix

services:
  synapse:
    image: docker.io/matrixdotorg/synapse:latest
    container_name: synapse
    restart: unless-stopped
    depends_on:
      - synapse-postgres
    volumes:
      - ${DATA_PATH}/matrix/synapse:/data
    environment:
      - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.matrix.rule=Host(`${TAILSCALE_HOST}`) && PathPrefix(`/_matrix`)"
      - "traefik.http.routers.matrix.entrypoints=websecure"
      - "traefik.http.routers.matrix.tls=true"
      - "traefik.http.services.matrix.loadbalancer.server.port=8008"

  synapse-postgres:
    image: docker.io/postgres:16-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${SYNAPSE_POSTGRES_PASSWORD}
      - POSTGRES_USER=synapse
      - POSTGRES_DB=synapse
    volumes:
      - ${DATA_PATH}/matrix/postgres:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: homeserver_proxy
