global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: homeserver_proxy
  file:
    directory: /etc/traefik/conf.d
    watch: true

# Enable insecure backends (e.g. Portainer HTTPS)
serversTransport:
  insecureSkipVerify: true
