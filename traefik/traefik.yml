global:
  sendAnonymousUsage: false

log:
  level: INFO

api:
  dashboard: true
  insecure: true # FIXME: false

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: homeserver_proxy

# Enable insecure backends (e.g. Portainer HTTPS)
serversTransport:
  insecureSkipVerify: true
